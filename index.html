<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09090f;--s1:#111118;--s2:#18181f;--s3:#222230;--acc:#3d8ef5;--acc2:#1a5fb8;--tx:#dcdcf0;--mu:#7070a0;--ok:#22cc77;--er:#e24b4a;--warn:#f5a623}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:Arial,'Segoe UI',sans-serif;font-size:16px}
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg);overflow-y:auto}
.login-box{background:var(--s1);border:1px solid var(--s3);border-radius:20px;padding:40px 48px;width:600px;max-width:95vw;margin:auto}
.logo{text-align:center;font-size:38px;margin-bottom:6px}
.logo-text{text-align:center;font-size:21px;font-weight:700;color:var(--acc);margin-bottom:24px}
.accounts-wrap{margin-bottom:20px}
.accounts-label{font-size:13px;color:var(--mu);margin-bottom:8px;text-align:right}
.accounts-list{display:flex;flex-wrap:wrap;gap:8px}
.acc-chip{padding:7px 14px;background:var(--s2);border:1px solid var(--s3);border-radius:20px;color:var(--tx);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.acc-chip:hover{background:var(--s3)}
.acc-del{color:var(--er);font-size:18px;line-height:1;padding:0 2px}
.upload-area{width:100%;padding:30px;background:var(--s2);border:2px dashed var(--s3);border-radius:12px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:14px}
.upload-area:hover{border-color:var(--acc);background:rgba(61,142,245,0.05)}
.upload-area.dragover{border-color:var(--acc);background:rgba(61,142,245,0.1)}
.upload-icon{font-size:36px;margin-bottom:8px}
.upload-txt{font-size:14px;color:var(--mu)}
.upload-file-name{font-size:13px;color:var(--ok);margin-top:8px;font-weight:600}
input[type=file]{display:none}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--mu);margin-bottom:5px;font-weight:600;text-align:right}
.field input{width:100%;padding:12px 16px;background:var(--s2);border:2px solid var(--s3);border-radius:10px;color:var(--tx);font-size:15px;outline:none;direction:ltr;text-align:left;transition:border-color 0.2s}
.field input:focus{border-color:var(--acc)}
.hint{font-size:11px;color:var(--mu);margin-top:4px;text-align:right}
.btn-connect{width:100%;padding:15px;background:var(--acc);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-top:4px;transition:background 0.2s}
.btn-connect:hover{background:var(--acc2)}
.btn-connect:disabled{background:var(--s3);color:var(--mu);cursor:not-allowed}
.err-msg{color:var(--er);font-size:14px;text-align:center;margin-top:8px;min-height:18px}
.prog-wrap{margin-top:12px;display:none}
.prog-bar-bg{background:var(--s2);border-radius:10px;height:6px;overflow:hidden}
.prog-bar{height:6px;background:var(--acc);border-radius:10px;width:0%;transition:width 0.4s}
.prog-txt{font-size:13px;color:var(--mu);text-align:center;margin-top:5px}
#player{display:none;height:100vh;flex-direction:column}
.top-bar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:var(--s1);border-bottom:1px solid var(--s3);flex-shrink:0}
.app-name{font-size:15px;font-weight:700;color:var(--acc)}
.now-playing{flex:1;font-size:13px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl}
.btn-back{padding:6px 14px;background:var(--s2);border:1px solid var(--s3);border-radius:8px;color:var(--tx);font-size:13px;cursor:pointer}
.btn-back:hover{background:var(--s3)}
.acc-badge{padding:5px 12px;background:rgba(61,142,245,0.15);border:1px solid var(--acc);border-radius:20px;font-size:12px;color:var(--acc);white-space:nowrap}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:340px;background:var(--s1);display:flex;flex-direction:column;border-left:1px solid var(--s3);flex-shrink:0}
.search-wrap{padding:10px 12px;border-bottom:1px solid var(--s3)}
.search-wrap input{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--s3);border-radius:8px;color:var(--tx);font-size:14px;outline:none;direction:rtl}
.search-wrap input:focus{border-color:var(--acc)}
.cats-wrap{display:flex;overflow-x:auto;padding:8px 12px;gap:6px;border-bottom:1px solid var(--s3);flex-shrink:0}
.cats-wrap::-webkit-scrollbar{height:3px}
.cats-wrap::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
.cat-btn{padding:6px 12px;background:var(--s2);border:1px solid var(--s3);border-radius:16px;color:var(--mu);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cat-btn:hover{background:var(--s3);color:var(--tx)}
.cat-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.ch-list{flex:1;overflow-y:auto}
.ch-list::-webkit-scrollbar{width:4px}
.ch-list::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
.ch-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--s2);transition:background 0.1s;direction:rtl}
.ch-item:hover,.ch-item:focus{background:var(--s2);outline:none}
.ch-item.active{background:rgba(61,142,245,0.12);border-right:3px solid var(--acc)}
.ch-num{color:var(--mu);font-size:12px;min-width:26px;text-align:left;direction:ltr}
.ch-logo{width:34px;height:34px;object-fit:contain;border-radius:6px;background:var(--s3);flex-shrink:0}
.ch-logo-ph{width:34px;height:34px;background:var(--s3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ch-name{font-size:14px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-empty{padding:40px 20px;text-align:center;color:var(--mu);font-size:14px}
.video-wrap{flex:1;display:flex;flex-direction:column;background:#000;min-width:0}
.video-container{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,0.8)}
.overlay.hidden{display:none}
.spinner{width:50px;height:50px;border:4px solid var(--s3);border-top-color:var(--acc);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay-icon{font-size:48px}
.overlay-text{font-size:15px;color:var(--mu);text-align:center;padding:0 20px}
.status-bar{padding:9px 18px;background:var(--s1);border-top:1px solid var(--s3);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dot{width:9px;height:9px;border-radius:50%;background:var(--s3);flex-shrink:0}
.dot.playing{background:var(--ok)}
.dot.loading{background:var(--warn);animation:blink 0.8s infinite}
.dot.error{background:var(--er)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.st-text{font-size:13px;color:var(--mu);flex:1;direction:rtl;text-align:right}
</style>
</head>
<body>
<div id="login">
  <div class="login-box">
    <div class="logo">📺</div>
    <div class="logo-text">IPTV PLAYER</div>
    <div class="accounts-wrap" id="accounts-wrap" style="display:none">
      <div class="accounts-label">✅ الحسابات المحفوظة:</div>
      <div class="accounts-list" id="accounts-list"></div>
    </div>
    <div class="field">
      <label>اسم الحساب (للحفظ - اختياري)</label>
      <input type="text" id="inp-name" placeholder="مثال: البيت، الشغل..." autocomplete="off"/>
    </div>
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📂</div>
      <div class="upload-txt">اضغط هنا لاختيار ملف M3U<br><small>أو اسحب الملف وأفلته هنا</small></div>
      <div class="upload-file-name" id="file-name"></div>
    </div>
    <input type="file" id="file-input" accept=".m3u,.m3u8,.txt" onchange="onFileSelect(this)"/>
    <div id="err" class="err-msg"></div>
    <button class="btn-connect" id="btn-connect" onclick="doConnect()">تحميل القنوات</button>
    <div class="prog-wrap" id="prog-wrap">
      <div class="prog-bar-bg"><div class="prog-bar" id="prog-bar"></div></div>
      <div class="prog-txt" id="prog-txt">جاري التحميل...</div>
    </div>
  </div>
</div>

<div id="player">
  <div class="top-bar">
    <button class="btn-back" onclick="goBack()">← خروج</button>
    <span class="app-name">IPTV</span>
    <span class="now-playing" id="now-playing">اختر قناة</span>
    <span class="acc-badge" id="acc-badge"></span>
  </div>
  <div class="main">
    <div class="video-wrap">
      <div class="video-container">
        <video id="vid" controls playsinline></video>
        <div class="overlay" id="vid-overlay">
          <div class="overlay-icon">📺</div>
          <div class="overlay-text">اختر قناة من القائمة على اليمين</div>
        </div>
      </div>
      <div class="status-bar">
        <div class="dot" id="st-dot"></div>
        <span class="st-text" id="st-text">في انتظار اختيار قناة</span>
      </div>
    </div>
    <div class="sidebar">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="🔍 ابحث عن قناة..." oninput="renderChannels()"/>
      </div>
      <div class="cats-wrap" id="cats"></div>
      <div class="ch-list" id="ch-list"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<script>
var allChannels=[],allCats=[],currentCat='all',hlsInst=null,currentChEl=null;
var currentName='',selectedFileText='';

function proxyUrl(url){
  // Route all streams through our proxy to avoid mixed content
  return '/api/proxy?url='+encodeURIComponent(url);
}

function onFileSelect(inp){
  var f=inp.files[0];if(!f)return;
  document.getElementById('file-name').textContent='✅ '+f.name;
  var r=new FileReader();
  r.onload=function(e){selectedFileText=e.target.result;};
  r.readAsText(f,'utf-8');
}
var ua=document.getElementById('upload-area');
ua.addEventListener('dragover',function(e){e.preventDefault();ua.classList.add('dragover');});
ua.addEventListener('dragleave',function(){ua.classList.remove('dragover');});
ua.addEventListener('drop',function(e){
  e.preventDefault();ua.classList.remove('dragover');
  var f=e.dataTransfer.files[0];
  if(f){document.getElementById('file-name').textContent='✅ '+f.name;
    var r=new FileReader();r.onload=function(ev){selectedFileText=ev.target.result;};r.readAsText(f,'utf-8');}
});

function loadAccounts(){try{return JSON.parse(localStorage.getItem('iptv_accs')||'[]');}catch(e){return[];}}
function saveAccounts(arr){try{localStorage.setItem('iptv_accs',JSON.stringify(arr));}catch(e){}}
function renderAccountChips(){
  var accs=loadAccounts();
  var wrap=document.getElementById('accounts-wrap');
  var list=document.getElementById('accounts-list');
  list.innerHTML='';
  if(!accs.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  accs.forEach(function(a,i){
    var chip=document.createElement('div');chip.className='acc-chip';
    chip.innerHTML='<span>'+esc(a.name)+'</span><span class="acc-del">×</span>';
    chip.querySelector('span:first-child').onclick=function(){
      document.getElementById('inp-name').value=a.name;
      processM3U(a.m3u,a.name);
    };
    chip.querySelector('.acc-del').onclick=function(e){
      e.stopPropagation();
      var arr=loadAccounts();arr.splice(i,1);saveAccounts(arr);renderAccountChips();
    };
    list.appendChild(chip);
  });
}
function saveAccount(name,m3u){
  if(!name)return;
  var arr=loadAccounts();
  var s=m3u.length>300000?m3u.substring(0,300000):m3u;
  var idx=arr.findIndex(function(a){return a.name===name;});
  if(idx>=0)arr[idx]={name:name,m3u:s};else arr.push({name:name,m3u:s});
  saveAccounts(arr);renderAccountChips();
}

function showErr(msg){document.getElementById('err').textContent=msg;}
function setBtn(on,txt){var b=document.getElementById('btn-connect');b.disabled=!on;b.textContent=txt||'تحميل القنوات';}
function setProg(pct,txt){
  document.getElementById('prog-wrap').style.display='block';
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=txt;
}

function doConnect(){
  showErr('');
  if(!selectedFileText){showErr('من فضلك اختر ملف M3U أولاً');return;}
  var name=document.getElementById('inp-name').value.trim();
  processM3U(selectedFileText,name);
}

function processM3U(text,name){
  setBtn(false,'جاري المعالجة...');
  setProg(50,'جاري معالجة القنوات...');
  currentName=name||'حسابي';
  try{
    var parsed=parseM3U(text);
    if(!parsed.channels.length){showErr('لم يتم العثور على قنوات');setBtn(true,'تحميل القنوات');document.getElementById('prog-wrap').style.display='none';return;}
    allChannels=parsed.channels;allCats=parsed.cats;
    if(name) saveAccount(name,text);
    setProg(100,'تم! '+allChannels.length+' قناة 🎉');
    setTimeout(function(){
      document.getElementById('login').style.display='none';
      document.getElementById('player').style.display='flex';
      document.getElementById('acc-badge').textContent=currentName;
      renderCats();renderChannels();
    },300);
  }catch(e){
    showErr('خطأ: '+e.message);setBtn(true,'تحميل القنوات');
    document.getElementById('prog-wrap').style.display='none';
  }
}

function parseM3U(text){
  var lines=text.split('\n'),channels=[],cats=new Set(),current={};
  lines.forEach(function(line){
    line=line.trim();
    if(line.startsWith('#EXTINF')){
      current={};
      var nm=line.match(/,(.+)$/);if(nm)current.name=nm[1].trim();
      var gr=line.match(/group-title="([^"]*)"/);current.group=gr?gr[1].trim()||'عام':'عام';
      var lo=line.match(/tvg-logo="([^"]*)"/);if(lo)current.logo=lo[1].trim();
      cats.add(current.group);
    }else if(line&&!line.startsWith('#')&&current.name){
      current.url=line;channels.push(Object.assign({},current));current={};
    }
  });
  return{channels:channels,cats:Array.from(cats)};
}

function renderCats(){
  var el=document.getElementById('cats');el.innerHTML='';
  addCatBtn(el,'all','الكل ('+allChannels.length+')');
  allCats.forEach(function(c){
    var cnt=allChannels.filter(function(ch){return ch.group===c;}).length;
    addCatBtn(el,c,c+' ('+cnt+')');
  });
}
function addCatBtn(el,id,name){
  var b=document.createElement('button');
  b.className='cat-btn'+(id==='all'?' active':'');
  b.textContent=name;
  b.onclick=function(){
    currentCat=id;
    document.querySelectorAll('.cat-btn').forEach(function(x){x.classList.toggle('active',x===b);});
    renderChannels();
  };
  el.appendChild(b);
}
function renderChannels(){
  var q=(document.getElementById('search').value||'').toLowerCase().trim();
  var list=currentCat==='all'?allChannels:allChannels.filter(function(c){return c.group===currentCat;});
  if(q)list=list.filter(function(c){return(c.name||'').toLowerCase().includes(q);});
  var el=document.getElementById('ch-list');el.innerHTML='';
  if(!list.length){el.innerHTML='<div class="ch-empty">لا توجد قنوات</div>';return;}
  list.forEach(function(ch,i){
    var item=document.createElement('div');item.className='ch-item';item.tabIndex=0;
    var logo=ch.logo?'<img class="ch-logo" src="'+esc(ch.logo)+'" onerror="this.style.display=\'none\'" loading="lazy">':'<div class="ch-logo-ph">📺</div>';
    item.innerHTML='<span class="ch-num">'+(i+1)+'</span>'+logo+'<span class="ch-name">'+esc(ch.name||'قناة')+'</span>';
    item.onclick=function(){playChannel(ch,item);};
    item.onkeydown=function(e){if(e.key==='Enter')playChannel(ch,item);};
    el.appendChild(item);
  });
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setStatus(s,t){document.getElementById('st-dot').className='dot '+s;document.getElementById('st-text').textContent=t;}
function showOverlay(type,text){
  var o=document.getElementById('vid-overlay');
  if(type==='hide'){o.classList.add('hidden');return;}
  o.classList.remove('hidden');
  if(type==='loading')o.innerHTML='<div class="spinner"></div><div class="overlay-text">'+text+'</div>';
  else o.innerHTML='<div class="overlay-icon">⚠️</div><div class="overlay-text">'+text+'</div>';
}

function playChannel(ch,el){
  if(currentChEl)currentChEl.classList.remove('active');
  currentChEl=el;el.classList.add('active');
  var name=ch.name||'قناة';
  document.getElementById('now-playing').textContent=name;
  setStatus('loading','جاري تحميل: '+name);
  showOverlay('loading','جاري تحميل: '+name);

  var originalUrl=ch.url;
  var pUrl=proxyUrl(originalUrl);
  var vid=document.getElementById('vid');
  if(hlsInst){hlsInst.destroy();hlsInst=null;}
  vid.pause();vid.removeAttribute('src');vid.load();

  function tryProxy(){
    // Use proxy URL for HLS
    if(window.Hls&&Hls.isSupported()){
      hlsInst=new Hls({enableWorker:false,maxBufferLength:30,startLevel:-1,
        xhrSetup:function(xhr,url){
          // If HLS tries to load segments with http, proxy them too
          if(url.startsWith('http://')){
            xhr.open('GET',proxyUrl(url),true);
          }
        }
      });
      hlsInst.loadSource(pUrl);
      hlsInst.attachMedia(vid);
      hlsInst.on(Hls.Events.MANIFEST_PARSED,function(){
        vid.play().then(function(){setStatus('playing','يشتغل: '+name);showOverlay('hide');}).catch(function(){});
      });
      hlsInst.on(Hls.Events.ERROR,function(ev,data){
        if(data.fatal){
          hlsInst.destroy();hlsInst=null;
          // try direct proxy as video src
          vid.src=pUrl;
          vid.play().then(function(){setStatus('playing','يشتغل: '+name);showOverlay('hide');})
          .catch(function(){setStatus('error','تعذّر التشغيل');showOverlay('error','تعذّر تشغيل هذه القناة\nجرّب قناة أخرى');});
        }
      });
    }else{
      vid.src=pUrl;
      vid.play().then(function(){setStatus('playing','يشتغل: '+name);showOverlay('hide');})
      .catch(function(){setStatus('error','تعذّر التشغيل');showOverlay('error','تعذّر تشغيل هذه القناة\nجرّب قناة أخرى');});
    }
  }

  tryProxy();
}

function goBack(){
  var vid=document.getElementById('vid');
  if(hlsInst){hlsInst.destroy();hlsInst=null;}
  vid.pause();vid.removeAttribute('src');
  document.getElementById('player').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('prog-wrap').style.display='none';
  selectedFileText='';
  document.getElementById('file-name').textContent='';
  setBtn(true,'تحميل القنوات');
  renderAccountChips();
}
renderAccountChips();
</script>
</body>
</html>
