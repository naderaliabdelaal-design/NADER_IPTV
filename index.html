<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09090f;--s1:#111118;--s2:#18181f;--s3:#222230;--acc:#3d8ef5;--acc2:#1a5fb8;--tx:#dcdcf0;--mu:#7070a0;--ok:#22cc77;--er:#e24b4a;--warn:#f5a623}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:Arial,'Segoe UI',sans-serif;font-size:16px}
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg)}
.login-box{background:var(--s1);border:1px solid var(--s3);border-radius:20px;padding:44px 52px;width:580px;max-width:95vw}
.logo{text-align:center;font-size:38px;margin-bottom:6px}
.logo-text{text-align:center;font-size:21px;font-weight:700;color:var(--acc);margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:14px;color:var(--mu);margin-bottom:6px;font-weight:600;text-align:right}
.field input{width:100%;padding:13px 16px;background:var(--s2);border:2px solid var(--s3);border-radius:10px;color:var(--tx);font-size:16px;outline:none;direction:ltr;text-align:left;transition:border-color 0.2s}
.field input:focus{border-color:var(--acc)}
.hint{font-size:12px;color:var(--mu);margin-top:4px;text-align:right}
.btn-connect{width:100%;padding:16px;background:var(--acc);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-connect:hover{background:var(--acc2)}
.btn-connect:disabled{background:var(--s3);color:var(--mu);cursor:not-allowed}
.err-msg{color:var(--er);font-size:14px;text-align:center;margin-top:10px;min-height:20px;white-space:pre-line}
.prog-wrap{margin-top:14px;display:none}
.prog-bar-bg{background:var(--s2);border-radius:10px;height:6px;overflow:hidden}
.prog-bar{height:6px;background:var(--acc);border-radius:10px;width:0%;transition:width 0.4s}
.prog-txt{font-size:13px;color:var(--mu);text-align:center;margin-top:6px}
#player{display:none;height:100vh;flex-direction:column}
.top-bar{display:flex;align-items:center;gap:16px;padding:10px 20px;background:var(--s1);border-bottom:1px solid var(--s3);flex-shrink:0}
.app-name{font-size:16px;font-weight:700;color:var(--acc)}
.now-playing{flex:1;font-size:14px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl}
.btn-back{padding:6px 14px;background:var(--s2);border:1px solid var(--s3);border-radius:8px;color:var(--tx);font-size:13px;cursor:pointer}
.btn-back:hover{background:var(--s3)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:360px;background:var(--s1);display:flex;flex-direction:column;border-left:1px solid var(--s3);flex-shrink:0}
.search-wrap{padding:12px 14px;border-bottom:1px solid var(--s3)}
.search-wrap input{width:100%;padding:10px 14px;background:var(--s2);border:1px solid var(--s3);border-radius:8px;color:var(--tx);font-size:15px;outline:none;direction:rtl}
.search-wrap input:focus{border-color:var(--acc)}
.cats-wrap{display:flex;overflow-x:auto;padding:10px 14px;gap:8px;border-bottom:1px solid var(--s3);flex-shrink:0}
.cats-wrap::-webkit-scrollbar{height:4px}
.cats-wrap::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
.cat-btn{padding:7px 14px;background:var(--s2);border:1px solid var(--s3);border-radius:20px;color:var(--mu);font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cat-btn:hover{background:var(--s3);color:var(--tx)}
.cat-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.ch-list{flex:1;overflow-y:auto}
.ch-list::-webkit-scrollbar{width:5px}
.ch-list::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
.ch-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--s2);transition:background 0.1s;direction:rtl}
.ch-item:hover,.ch-item:focus{background:var(--s2);outline:none}
.ch-item.active{background:rgba(61,142,245,0.12);border-right:3px solid var(--acc)}
.ch-num{color:var(--mu);font-size:13px;min-width:28px;text-align:left;direction:ltr}
.ch-logo{width:36px;height:36px;object-fit:contain;border-radius:6px;background:var(--s3);flex-shrink:0}
.ch-logo-ph{width:36px;height:36px;background:var(--s3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ch-name{font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-empty{padding:40px 20px;text-align:center;color:var(--mu);font-size:15px}
.video-wrap{flex:1;display:flex;flex-direction:column;background:#000;min-width:0}
.video-container{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(0,0,0,0.8)}
.overlay.hidden{display:none}
.spinner{width:52px;height:52px;border:4px solid var(--s3);border-top-color:var(--acc);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay-icon{font-size:50px}
.overlay-text{font-size:16px;color:var(--mu);text-align:center;padding:0 20px}
.status-bar{padding:10px 20px;background:var(--s1);border-top:1px solid var(--s3);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dot{width:10px;height:10px;border-radius:50%;background:var(--s3);flex-shrink:0}
.dot.playing{background:var(--ok)}
.dot.loading{background:var(--warn);animation:blink 0.8s infinite}
.dot.error{background:var(--er)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.st-text{font-size:14px;color:var(--mu);flex:1;direction:rtl;text-align:right}
</style>
</head>
<body>
<div id="login">
  <div class="login-box">
    <div class="logo">📺</div>
    <div class="logo-text">IPTV PLAYER</div>
    <div class="field">
      <label>Portal URL</label>
      <input type="text" id="inp-portal" placeholder="http://example.com:8080" autocomplete="off"/>
      <div class="hint">الرابط بدون / في الآخر</div>
    </div>
    <div class="field">
      <label>اسم المستخدم</label>
      <input type="text" id="inp-user" placeholder="username" autocomplete="username"/>
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="inp-pass" placeholder="password" autocomplete="current-password"/>
    </div>
    <div id="err" class="err-msg"></div>
    <button class="btn-connect" id="btn-connect" onclick="doConnect()">اتصال</button>
    <div class="prog-wrap" id="prog-wrap">
      <div class="prog-bar-bg"><div class="prog-bar" id="prog-bar"></div></div>
      <div class="prog-txt" id="prog-txt">جاري الاتصال...</div>
    </div>
  </div>
</div>
<div id="player">
  <div class="top-bar">
    <button class="btn-back" onclick="goBack()">← خروج</button>
    <span class="app-name">IPTV</span>
    <span class="now-playing" id="now-playing">اختر قناة من القائمة</span>
  </div>
  <div class="main">
    <div class="video-wrap">
      <div class="video-container">
        <video id="vid" controls playsinline></video>
        <div class="overlay" id="vid-overlay">
          <div class="overlay-icon">📺</div>
          <div class="overlay-text">اختر قناة من القائمة على اليمين</div>
        </div>
      </div>
      <div class="status-bar">
        <div class="dot" id="st-dot"></div>
        <span class="st-text" id="st-text">في انتظار اختيار قناة</span>
      </div>
    </div>
    <div class="sidebar">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="🔍 ابحث عن قناة..." oninput="renderChannels()"/>
      </div>
      <div class="cats-wrap" id="cats"></div>
      <div class="ch-list" id="ch-list"></div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<script>
var creds={},allChannels=[],allCats=[],currentCat='all',hlsInst=null,currentChEl=null;

function showErr(msg){document.getElementById('err').textContent=msg;}
function setBtn(on,txt){var b=document.getElementById('btn-connect');b.disabled=!on;b.textContent=txt||'اتصال';}
function setProg(pct,txt){
  document.getElementById('prog-wrap').style.display='block';
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=txt;
}
async function proxyFetch(url){
  var r=await fetch('/api/proxy?url='+encodeURIComponent(url));
  if(!r.ok) throw new Error('خطأ في الاتصال ('+r.status+')');
  return await r.json();
}
async function doConnect(){
  showErr('');
  var portal=document.getElementById('inp-portal').value.trim().replace(/\/+$/,'');
  var user=document.getElementById('inp-user').value.trim();
  var pass=document.getElementById('inp-pass').value.trim();
  if(!portal||!user||!pass){showErr('من فضلك أدخل كل البيانات');return;}
  if(!/^https?:\/\//i.test(portal)){showErr('الرابط يجب أن يبدأ بـ http:// أو https://');return;}
  creds={portal,user,pass};
  setBtn(false,'جاري الاتصال...');
  setProg(10,'جاري الاتصال...');
  try{
    var base=portal+'/player_api.php?username='+encodeURIComponent(user)+'&password='+encodeURIComponent(pass);
    setProg(20,'جاري تحميل التصنيفات...');
    var cats=await proxyFetch(base+'&action=get_live_categories');
    if(!Array.isArray(cats)) cats=[];
    setProg(55,'جاري تحميل القنوات...');
    var streams=await proxyFetch(base+'&action=get_live_streams');
    if(!Array.isArray(streams)) throw new Error('تأكد من صحة البيانات');
    allCats=cats;allChannels=streams;
    setProg(100,'تم!');
    setTimeout(function(){
      document.getElementById('login').style.display='none';
      document.getElementById('player').style.display='flex';
      renderCats();renderChannels();
    },300);
  }catch(e){
    showErr(e.message);setBtn(true,'اتصال');
    document.getElementById('prog-wrap').style.display='none';
  }
}
function renderCats(){
  var el=document.getElementById('cats');el.innerHTML='';
  addCatBtn(el,'all','الكل');
  allCats.forEach(function(c){addCatBtn(el,c.category_id,c.category_name);});
}
function addCatBtn(el,id,name){
  var b=document.createElement('button');
  b.className='cat-btn'+(id==='all'?' active':'');
  b.textContent=name;
  b.onclick=function(){
    currentCat=id;
    document.querySelectorAll('.cat-btn').forEach(function(x){x.classList.toggle('active',x===b);});
    renderChannels();
  };
  el.appendChild(b);
}
function renderChannels(){
  var q=(document.getElementById('search').value||'').toLowerCase().trim();
  var list=currentCat==='all'?allChannels:allChannels.filter(function(c){return c.category_id==currentCat;});
  if(q) list=list.filter(function(c){return (c.name||'').toLowerCase().includes(q);});
  var el=document.getElementById('ch-list');el.innerHTML='';
  if(!list.length){el.innerHTML='<div class="ch-empty">لا توجد قنوات</div>';return;}
  list.forEach(function(ch,i){
    var item=document.createElement('div');
    item.className='ch-item';item.tabIndex=0;
    var logo=ch.stream_icon?'<img class="ch-logo" src="'+esc(ch.stream_icon)+'" onerror="this.style.display=\'none\'" loading="lazy">':'<div class="ch-logo-ph">📺</div>';
    item.innerHTML='<span class="ch-num">'+(ch.num||i+1)+'</span>'+logo+'<span class="ch-name">'+esc(ch.name||'قناة')+'</span>';
    item.onclick=function(){playChannel(ch,item);};
    item.onkeydown=function(e){if(e.key==='Enter')playChannel(ch,item);};
    el.appendChild(item);
  });
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setStatus(s,t){document.getElementById('st-dot').className='dot '+s;document.getElementById('st-text').textContent=t;}
function showOverlay(type,text){
  var o=document.getElementById('vid-overlay');
  if(type==='hide'){o.classList.add('hidden');return;}
  o.classList.remove('hidden');
  if(type==='loading') o.innerHTML='<div class="spinner"></div><div class="overlay-text">'+text+'</div>';
  else o.innerHTML='<div class="overlay-icon">⚠️</div><div class="overlay-text">'+text+'</div>';
}
function playChannel(ch,el){
  if(currentChEl) currentChEl.classList.remove('active');
  currentChEl=el;el.classList.add('active');
  var name=ch.name||'قناة';
  document.getElementById('now-playing').textContent=name;
  setStatus('loading','جاري تحميل: '+name);
  showOverlay('loading','جاري تحميل: '+name);
  var {portal,user,pass}=creds;
  var m3u8=portal+'/live/'+encodeURIComponent(user)+'/'+encodeURIComponent(pass)+'/'+ch.stream_id+'.m3u8';
  var ts=portal+'/live/'+encodeURIComponent(user)+'/'+encodeURIComponent(pass)+'/'+ch.stream_id+'.ts';
  var vid=document.getElementById('vid');
  if(hlsInst){hlsInst.destroy();hlsInst=null;}
  vid.pause();vid.removeAttribute('src');vid.load();
  function tryTs(){
    vid.src=ts;
    vid.play().then(function(){setStatus('playing','يشتغل: '+name);showOverlay('hide');})
    .catch(function(){setStatus('error','تعذّر التشغيل');showOverlay('error','تعذّر تشغيل هذه القناة\nجرّب قناة أخرى');});
  }
  if(window.Hls&&Hls.isSupported()){
    hlsInst=new Hls({enableWorker:false,maxBufferLength:30,startLevel:-1});
    hlsInst.loadSource(m3u8);hlsInst.attachMedia(vid);
    hlsInst.on(Hls.Events.MANIFEST_PARSED,function(){
      vid.play().then(function(){setStatus('playing','يشتغل: '+name);showOverlay('hide');}).catch(function(){});
    });
    hlsInst.on(Hls.Events.ERROR,function(ev,data){if(data.fatal){hlsInst.destroy();hlsInst=null;tryTs();}});
  }else if(vid.canPlayType('application/vnd.apple.mpegurl')){
    vid.src=m3u8;
    vid.play().then(function(){setStatus('playing','يشتغل: '+name);showOverlay('hide');}).catch(tryTs);
  }else{tryTs();}
}
function goBack(){
  var vid=document.getElementById('vid');
  if(hlsInst){hlsInst.destroy();hlsInst=null;}
  vid.pause();vid.removeAttribute('src');
  document.getElementById('player').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('prog-wrap').style.display='none';
  setBtn(true,'اتصال');
}
</script>
</body>
</html>
